<style>


* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    background-color: var(--bg-page);
    color: var(--text-primary);
    font-family: var(--font-primary);
    font-weight: 300;
    line-height: 1.7;
    transition: all var(--transition-base);
}


nav {
    position: sticky;
    top: 0;
    height: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    background: color-mix(in oklab, var(--bg-page) 86%, transparent);
    backdrop-filter: saturate(1.4) blur(14px);
    -webkit-backdrop-filter: saturate(1.4) blur(14px);
    border-bottom: 1px solid var(--border-subtle);
    z-index: 40;
}


.nav-brand {
    font-family: var(--font-primary);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-primary);
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: color var(--transition-base);
}
.nav-brand:hover {
    color: var(--accent);
    text-decoration: none;
}

.nav-brand-locs {
    font-family: var(--font-mono);
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    margin-left: 12px;
    padding-left: 12px;
    border-left: 1px solid var(--border-subtle);
    text-decoration: none;
}
@media (max-width: 1180px) {
    .nav-brand-locs { display: none; }
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 40px;
}

.nav-links {
    display: flex;
    gap: 18px;
    align-items: center;
}

.nav-link-group {
    display: flex;
    gap: 18px;
    align-items: center;
}

.nav-link-group + .nav-link-group {
    padding-left: 18px;
    border-left: 1px solid var(--border-subtle);
}


.nav-link {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 0 1px;
    border-bottom: 2px solid transparent;
    color: var(--text-secondary);
    text-decoration: none;
    transition:
        color var(--transition-base),
        border-color var(--transition-base);
}

.nav-link:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
}

.nav-link.is-active,
.nav-link[aria-current="page"],
.nav-link[aria-current="location"] {
    color: var(--accent);
    border-bottom-color: var(--accent);
}


.hero {

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 40px;
    position: relative;
    overflow: hidden;
}

.hero-bg-img {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    min-height: 100%;
    max-width: none;
    object-fit: cover;
    pointer-events: none;
    z-index: 0;
    image-rendering: auto;
}

[data-theme="light"] .hero-bg-img {
    opacity: 0.18;
    filter: grayscale(62%);
}
[data-theme="dark"] .hero-bg-img {
    opacity: 0.10;
    filter: contrast(200%) hue-rotate(120deg);
}


.hero::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    background: var(--accent);
    opacity: 0.25;

    pointer-events: none;
}

.hero-content {
    position: relative;
    z-index: 1;
    max-width: 750px;
    text-align: left;
}


.hero-label {
    font-family: var(--font-mono);
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--primary-text);
    margin-bottom: 32px;
    display: block;
}


.hero-sub {
    margin-bottom: 48px;
    color: var(--primary-text);
    font-weight: 600;
}


.credentials-strip {
    background-color: var(--bg-section-alt);
    border-top: 1px solid var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle);
    padding: 28px 40px;
}

.credentials-strip-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 28px;
}

.credential-label {
    max-width: 320px;
    text-align: right;
    color: var(--text-muted);
}

.credential-logos {
    display: flex;
    align-items: center;
    gap: 22px;
}

.credential-logos a {
    display: flex;
    align-items: center;
    height: 58px;
    opacity: 0.82;
    transition: opacity var(--transition-base), transform var(--transition-base);
}

.credential-logos a:hover {
    opacity: 1;
    transform: translateY(-1px);
}

.credential-logos img {
    height: 100%;
    width: auto;
    object-fit: contain;
}

[data-theme="dark"] .credential-logos img {
    filter: brightness(0.92) contrast(0.92);
}


.services {
    padding: 120px 40px;
    background-color: var(--bg-page);
}



.services-inner {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
}



.services-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 32px;
    margin-top: 48px;
}

@media (max-width: 760px) {
    .services-grid {
        grid-template-columns: 1fr;
    }
}


.service-card {
    max-width: none;
    display: flex;
    flex-direction: column;
}
.service-card:hover {
    transform: translateY(-2px);
}

.service-icon {
    width: 60px;
    height: 60px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.service-icon svg {
    width: 100%;
    height: 100%;
}



.service-card__img-strip {
    height: 80px;
    margin: auto -32px -40px -32px;
    overflow: hidden;

    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
}

.service-card__img-strip img {
    width: 120%;
    height: 120%;
    object-fit: cover;
    object-position: center 50%;
}

[data-theme="light"] .service-card__img-strip img {
    opacity: 0.4;
    filter: grayscale(100%);
}

[data-theme="dark"] .service-card__img-strip img {
    opacity: 0.4;
    filter: grayscale(100%) invert(1);
}


.who-section {
    padding: 120px 40px;
    background-color: var(--bg-section-alt);
}

.who-inner {
    max-width: 1100px;
    margin: 0 auto;
}

.who-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 60px;
    margin-top: 60px;
}

@media (max-width: 900px) {
    .who-grid {
        grid-template-columns: 1fr;
        gap: 60px;
    }
}

.who-column {
    display: flex;
    flex-direction: column;
}

.who-icon {
    width: 120px;
    height: 120px;
    margin-bottom: 32px;
    image-rendering: pixelated;
}
.who-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}


.who-title {
    font-family: var(--font-primary);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-primary);
    margin-bottom: 16px;
}

.who-subtitle {
    font-family: var(--font-primary);
    font-weight: 300;
    font-size: 16px;
    color: var(--accent-text);
    margin-bottom: 20px;
}


.who-body {
    margin-bottom: 32px;
}


.process {
    padding: 120px 40px;
    background-color: var(--bg-page);
    position: relative;
}


.process::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
}
[data-theme="dark"] .process::before {
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='rgba(62,147,174,0.06)' stroke-width='0.5' fill='none'%3E%3Cline x1='0' y1='0' x2='40' y2='0'/%3E%3Cline x1='0' y1='0' x2='0' y2='40'/%3E%3C/g%3E%3C/svg%3E");
}
[data-theme="light"] .process::before {
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='rgba(62,147,174,0.08)' stroke-width='0.5' fill='none'%3E%3Cline x1='0' y1='0' x2='40' y2='0'/%3E%3Cline x1='0' y1='0' x2='0' y2='40'/%3E%3C/g%3E%3C/svg%3E");
}

.process-inner {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.process-timeline {
    display: flex;
    gap: 24px;
    margin-top: 80px;
    overflow-x: auto;
    padding-bottom: 20px;
    position: relative;
}

.process-timeline::before {
    content: '';
    position: absolute;
    top: 30px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--accent) 50%, transparent 50%);
    background-size: 20px 2px;
    z-index: 0;
    pointer-events: none;
}

@media (max-width: 768px) {
    .process-timeline {
        flex-direction: column;
        gap: 60px;
    }
    .process-timeline::before {
        content: none;
    }
}

.process-step {
    flex: 1;

    padding-right: 16px;
    position: relative;
    z-index: 1;
}

.step-number {
    width: 60px;
    height: 60px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-primary);
    font-weight: 500;
    font-size: 24px;
    color: var(--accent);
    background-color: var(--bg-page);
    margin-bottom: 24px;
}

@media (max-width: 768px) {
    .step-number {
        width: 50px;
        height: 50px;
        font-size: 18px;
    }
}

.step-title {
    font-family: var(--font-primary);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
}

.step-desc {
    font-family: var(--font-primary);
    font-weight: 300;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-secondary);

}


.deliverable {
    padding: 120px 40px;
    background-color: var(--bg-section-alt);
}

.deliverable-inner {
    max-width: 1100px;
    margin: 0 auto;
}

.deliverable-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    margin-top: 60px;
}

@media (max-width: 768px) {

        grid-template-columns: 1fr;

.report-mockup {
    background-color: var(--bg-card);
    border: 2px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 32px;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.report-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-subtle);
}

.report-title {
    font-family: var(--font-primary);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
}

.report-project {
    font-family: var(--font-mono);
    font-weight: 300;
    font-size: 10px;
    color: var(--text-muted);
}

.report-chart {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    height: 80px;
    margin-bottom: 32px;
}

.report-bar {
    flex: 1;
    background-color: var(--accent);
    border-radius: 2px;
    opacity: 0.7;
}

.report-bar:nth-child(1) { height: 60%; }
.report-bar:nth-child(2) { height: 85%; }
.report-bar:nth-child(3) { height: 45%; }
.report-bar:nth-child(4) { height: 70%; }

.report-table { margin-bottom: 32px; }

.report-table-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-subtle);
}
.report-table-row:first-child { padding-bottom: 12px; }

.report-table-label {
    font-family: var(--font-mono);
    font-weight: 300;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
}

.report-table-value {
    font-family: var(--font-primary);
    font-weight: 500;
    font-size: 12px;
    color: var(--text-primary);
}

.report-assembly {
    height: 160px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border-subtle);
}

.report-assembly img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
}

[data-theme="dark"] .report-assembly img {
    filter: invert(0.88) hue-rotate(180deg);
    opacity: 0.85;
}

.report-assembly-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 6px 10px;
    font-family: var(--font-mono);
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.05em;

}

.deliverable-content h3 {

.deliverable-intro {

}

.deliverable-list li::before {

.deliverable-closing {
