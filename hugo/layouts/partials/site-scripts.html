<script>
    function applyThemeIcons(theme) {
        const btn = document.getElementById('themeToggleBtn');
        if (!btn) return;
        const sun = btn.querySelector('.icon-sun');
        const moon = btn.querySelector('.icon-moon');
        if (theme === 'dark') {
            sun.style.display = 'none';
            moon.style.display = '';
        } else {
            sun.style.display = '';
            moon.style.display = 'none';
        }
    }

    document.getElementById('themeToggleBtn')?.addEventListener('click', () => {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        applyThemeIcons(newTheme);
        localStorage.setItem('theme', newTheme);
    });

    window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        applyThemeIcons(savedTheme);
        updateActiveNavLink();
    });

    function normalizePath(path) {
        if (path === '') return '/';
        return path.endsWith('/') ? path : `${path}/`;
    }

    function updateActiveNavLink() {
        const currentPath = normalizePath(window.location.pathname);
        const currentHash = window.location.hash;

        document.querySelectorAll('.nav-link').forEach(link => {
            const linkPath = normalizePath(link.dataset.navPath || new URL(link.href, window.location.href).pathname);
            const linkHash = link.dataset.navHash || '';
            const isActive = currentPath === linkPath && (!linkHash || currentHash === linkHash);

            link.classList.toggle('is-active', isActive);
            if (isActive) {
                link.setAttribute('aria-current', linkHash ? 'location' : 'page');
            } else {
                link.removeAttribute('aria-current');
            }
        });
    }

    window.addEventListener('hashchange', updateActiveNavLink);

    function handleCTA() {
        window.location.href = 'mailto:info@buildingtype.com';
    }

    document.querySelectorAll('a[href*="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            const url = new URL(this.getAttribute('href'), window.location.href);
            if (url.pathname !== window.location.pathname || !url.hash) return;

            const target = document.querySelector(url.hash);
            if (!target) return;

            e.preventDefault();
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            history.pushState(null, '', url.hash);
            updateActiveNavLink();
        });
    });
</script>
