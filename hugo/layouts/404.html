<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found · BLDGTYP</title>
    <meta name="description" content="The requested BLDGTYP page could not be found.">
    <meta name="robots" content="noindex">
    <link rel="canonical" href="{{ site.BaseURL }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="stylesheet" href="https://bldgtyp.github.io/bt-branding/tokens/tokens.css">
    <link rel="stylesheet" href="https://bldgtyp.github.io/bt-branding/tokens/components.css">
    {{ partial "site-styles.html" . }}
</head>
<body>
    {{ partial "nav.html" . }}
    <main>
        <section class="page-hero">
            <div class="page-hero-inner">
                <span class="section-label">404</span>
                <h1>Page not found.</h1>
                <p class="page-hero-intro type-body-lg">The page may have moved, or the URL may be wrong.</p>
                <p><a class="btn-primary" href="/">Return home &rarr;</a></p>
            </div>
        </section>
    </main>
    {{ partial "footer.html" . }}
    {{ partial "site-scripts.html" . }}
</body>
</html>
