# BLDGTYP static site — Hugo config.
# Builds INTO ../site/. Hugo is the source of truth; site/ is deploy output.
# Build:  cd hugo && hugo
# Dev:    cd hugo && hugo server --bind 127.0.0.1 --baseURL http://127.0.0.1:1313/

baseURL = "https://www.bldgtyp.com/"
languageCode = "en-us"
title = "BLDGTYP"
publishDir = "../site"

# Skip the machinery this small static site doesn't need.
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "robotsTXT", "404"]

[markup.goldmark.renderer]
  unsafe = true # allow inline HTML in markdown content

[params]
  email = "info@buildingtype.com"
