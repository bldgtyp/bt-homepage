      - generic [ref=e70]:
        - generic [ref=e71]:
          - heading "PERFORMANCE MODELING" [level=3] [ref=e72]
          - heading "Design with real numbers" [level=4] [ref=e73]
          - paragraph [ref=e74]: We model the whole building from envelope to mechanicals. Design decisions rest on real data instead of assumptions, with right-sized HVAC and a clear path to Passive House, code, or incentive targets before construction locks in.
          - img [ref=e76]
        - generic [ref=e77]:
          - heading "THERMAL BRIDGES" [level=3] [ref=e78]
          - heading "Find the hidden losses" [level=4] [ref=e79]
          - paragraph [ref=e80]:
            - text: 2D and 3D finite-element modeling finds envelope heat loss, condensation risk, and mold-risk conditions before construction. Every junction is verified against a buildable detail.
            - strong [ref=e81]: Filing in NYC?
            - text: The
            - link "2025 energy code now requires psi-value calculations" [ref=e82] [cursor=pointer]:
              - /url: /nyc-thermal-bridging/
            - text: ", a service we've delivered for over a decade."
          - img [ref=e84]
