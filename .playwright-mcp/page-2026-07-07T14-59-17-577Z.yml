    - generic [ref=e180]:
      - generic [ref=e181]: WORKING IN MASSACHUSETTS?
      - heading "Code-driven Passive House consulting specifically for MA multifamily." [level=2] [ref=e182]
      - paragraph [ref=e183]:
        - text: Massachusetts has become one of the most active Passive House markets in the country. The state's opt-in
        - strong [ref=e184]: Specialized Stretch Energy Code
        - text: recognizes Phius and PHI certification as a compliance pathway for new construction. The
        - link "Mass Save" [ref=e185] [cursor=pointer]:
          - /url: https://www.masssave.com
        - text: Passive House Incentive Program funds the work from feasibility study through certification. We support MA architects and developers across both phases from our new Massachusetts office.
      - generic [ref=e186]:
        - generic [ref=e187]:
          - generic [ref=e188]: 01 · CODE PATHWAY
          - heading "Specialized Stretch Code" [level=3] [ref=e189]
          - paragraph [ref=e190]: The Massachusetts Municipal Opt-in Specialized Stretch Energy Code (225 CMR 22 Appendix RC for residential, 225 CMR 23 Appendix CC for commercial) names Passive House, through Phius or PHI certification, as one of its published compliance pathways for new construction. Adoption is municipality-by-municipality and continues to expand each Town Meeting cycle.
          - generic [ref=e191]:
            - text: SOURCE
            - link "MA Building Energy Code →" [ref=e192] [cursor=pointer]:
              - /url: https://www.mass.gov/info-details/building-energy-code
        - generic [ref=e193]:
          - generic [ref=e194]: 02 · INCENTIVES
          - heading "Mass Save Passive House Program" [level=3] [ref=e195]
          - paragraph [ref=e196]: For multifamily new construction with five or more units in a Mass Save sponsor's service territory, the Passive House Incentive Program funds feasibility studies, pre-construction energy modeling, pre-certification, and per-unit certification incentives. Program eligibility requires a Passive House consultant certified through PHI or Phius. Refer to the program page for current incentive amounts.
          - generic [ref=e197]:
            - text: SOURCE
            - link "Passive House Incentives →" [ref=e198] [cursor=pointer]:
              - /url: https://www.masssave.com/residential/rebates-and-incentives/passive-house-incentives
        - generic [ref=e199]:
          - generic [ref=e200]: 03 · OUR ROLE
          - heading "Feasibility & Engineering" [level=3] [ref=e201]
          - paragraph [ref=e202]:
            - text: BLDGTYP is certified through both
            - link "Phius" [ref=e203] [cursor=pointer]:
              - /url: https://www.phius.org/
            - text: (CPHC) and
            - link "PHI" [ref=e204] [cursor=pointer]:
              - /url: https://passivehouse.com/
            - text: "(CPHD), meeting the Mass Save consultant requirement on either pathway. We deliver the full early-design scope: feasibility study, parametric envelope and HVAC analysis, WUFI-Passive / PHPP modeling, charrette support, and certification submission."
          - generic [ref=e205]:
            - text: REFERENCE
            - link "PH-Mass overview →" [ref=e206] [cursor=pointer]:
              - /url: https://phmass.org/masssave/
      - link "More on working in Massachusetts →" [ref=e208] [cursor=pointer]:
        - /url: /ma/
      - paragraph [ref=e209]: // Code adoption status varies by municipality and incentive amounts are updated periodically. Confirm current details with the Massachusetts Department of Energy Resources and the Mass Save program administrator before relying on them for project decisions.
