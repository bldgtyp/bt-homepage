          - paragraph [ref=e63]: Getting high-performance details right
          - paragraph [ref=e64]: Your name is on it. We help you develop blower-door-ready details you can actually install. The result is fewer callbacks and measured proof of the work.
          - paragraph [ref=e65]: Custom builds · Renovations
      - paragraph [ref=e66]: "// Were you sent here by your architect or builder? In plain terms: we're the specialists your team brings in to verify energy performance, comfort, and durability before anyone breaks ground."
