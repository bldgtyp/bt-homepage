          - paragraph [ref=e56]: Affordable multifamily at scale
          - paragraph [ref=e57]: Performance risk belongs in the pro forma early. We model efficiently, help you right-size the mechanicals, map incentives like Mass Save, stretch-code compliance, and LIHTC points, then prepare documentation your certifier and review team can use.
          - paragraph [ref=e58]: Affordable housing · Mixed-use · Multifamily
